<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Ink MIDI Web Player</title>
  <style>
    body {
      margin: 0;
      background-color: #f0f0f0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .app-container {
      background: white;
      padding: 15px;
      border: 1px solid #999;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }
    .info-label {
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      padding: 6px;
      margin-bottom: 5px;
      color: #333;
    }
    canvas {
      background: white;
      border: 1px solid #ccc;
      display: block;
      cursor: crosshair;
    }
    .controls {
      margin-top: 10px;
      width: 600px;
    }
    .time-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .play-btn {
      width: 80px;
      height: 30px;
      cursor: pointer;
    }
    .seek-bar {
      flex-grow: 1;
      cursor: pointer;
      accent-color: #444;
    }
    .time-display {
      font-size: 13px;
      width: 120px;
      text-align: right;
      font-family: monospace;
    }
    .config-group {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      background: #fafafa;
    }
    .config-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #555;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 5px;
    }
    .bottom-row {
      display: flex;
      gap: 10px;
    }
    .load-btn {
      flex-grow: 1;
      height: 40px;
      cursor: pointer;
      font-weight: bold;
    }
    .speed-select {
      height: 40px;
      width: 80px;
    }
  </style>
</head>
<body>

<div class="app-container">
  <div id="infoLabel" class="info-label">JSONをドロップまたは選択</div>
  <canvas id="canvas" width="600" height="600"></canvas>

  <div class="controls">
    <div class="time-row">
      <button id="playBtn" class="play-btn" disabled>▶ 再生</button>
      <input id="seekBar" class="seek-bar" type="range" min="0" max="0" step="1" value="0" disabled>
      <div id="timeLabel" class="time-display">0.00 / 0.00s</div>
    </div>

    <div class="config-group">
      <div class="config-title">表示 / エフェクト設定</div>
      <div class="row">
        <label><input id="loopCb" type="checkbox" checked> ループ</label>
        <label><input id="tipCb" type="checkbox" checked> ペン先</label>
        <label><input id="rainbowCb" type="checkbox"> 虹</label>
        <label><input id="gridCb" type="checkbox" checked> 格子</label>
        <button id="resetViewBtn" style="margin-left:auto; font-size:11px; cursor:pointer;">表示リセット</button>
      </div>
      <div class="row">
        <span>線の太さ:</span>
        <input id="thickSlider" type="range" min="5" max="50" value="10" style="flex-grow:1;">
        <span id="thickVal" style="width:35px;">1.0x</span>
      </div>
    </div>

    <div class="bottom-row">
      <input type="file" id="fileInput" style="display:none;" accept=".json">
      <button id="loadBtn" class="load-btn">JSONファイルを開く</button>
      <select id="speedSelect" class="speed-select">
        <option value="0.5">0.5x</option>
        <option value="1.0" selected>1.0x</option>
        <option value="2.0">2.0x</option>
        <option value="5.0">5.0x</option>
        <option value="10.0">10.0x</option>
      </select>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let strokes = [];
  let currentTimeMs = 0;
  let maxTimeMs = 0;
  let isPlaying = false;
  let isScrubbing = false;
  let thicknessMult = 1.0;
  let lastFrameTime = null;
  let scale = 1.0;
  let offsetX = 0;
  let offsetY = 0;
  let isPanning = false;
  let lastMouse = { x: 0, y: 0 };

  const playBtn = document.getElementById('playBtn');
  const seekBar = document.getElementById('seekBar');
  const timeLabel = document.getElementById('timeLabel');
  const infoLabel = document.getElementById('infoLabel');
  const thickSlider = document.getElementById('thickSlider');
  const thickVal = document.getElementById('thickVal');
  const gridCb = document.getElementById('gridCb');
  const tipCb = document.getElementById('tipCb');
  const rainbowCb = document.getElementById('rainbowCb');

  function renderLine(p1, p2, rainbow) {
    ctx.beginPath();
    ctx.lineWidth = (1 + p1.p * 12) * thicknessMult;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = rainbow ? `hsl(${(p1.t / 10) % 360}, 80%, 50%)` : 'black';
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  function draw() {
    ctx.clearRect(0, 0, 600, 600);
    ctx.save();

    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);

    if (gridCb.checked) {
      ctx.strokeStyle = '#ddd';
      ctx.setLineDash([5 / scale, 5 / scale]);
      ctx.lineWidth = 1 / scale;
      ctx.beginPath();
      ctx.moveTo(300, -5000);
      ctx.lineTo(300, 5000);
      ctx.moveTo(-5000, 300);
      ctx.lineTo(5000, 300);
      ctx.stroke();

      ctx.setLineDash([]);
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 2 / scale;
      ctx.strokeRect(2, 2, 596, 596);
    }

    let lastPt = null;
    const isRainbow = rainbowCb.checked;

    for (const stroke of strokes) {
      const points = stroke.points || [];
      for (let i = 0; i < points.length; i++) {
        const p = points[i];

        if (p.t > currentTimeMs) {
          if (i > 0) {
            const pPrev = points[i - 1];
            if (pPrev.t <= currentTimeMs) {
              const ratio = (currentTimeMs - pPrev.t) / Math.max(p.t - pPrev.t, 0.001);
              const iPt = {
                x: pPrev.x + (p.x - pPrev.x) * ratio,
                y: pPrev.y + (p.y - pPrev.y) * ratio,
                p: pPrev.p + (p.p - pPrev.p) * ratio,
                t: currentTimeMs
              };
              renderLine(pPrev, iPt, isRainbow);
              lastPt = iPt;
            }
          }
          break;
        }

        if (i > 0) renderLine(points[i - 1], p, isRainbow);
        lastPt = p;
      }
    }

    if (tipCb.checked && lastPt) {
      const pVal = lastPt.p || 0;
      ctx.fillStyle = isRainbow
        ? `hsl(${(lastPt.t / 10) % 360}, 80%, 50%)`
        : `rgba(255, 50, 50, ${0.6 + pVal * 0.4})`;
      ctx.beginPath();
      ctx.arc(lastPt.x, lastPt.y, (4 + pVal * 6) * thicknessMult, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function updateUI() {
    seekBar.value = currentTimeMs;
    timeLabel.textContent = `${(currentTimeMs / 1000).toFixed(2)} / ${(maxTimeMs / 1000).toFixed(2)}s`;
  }

  function tick(ts) {
    if (!isPlaying) {
      lastFrameTime = null;
      return;
    }

    if (!lastFrameTime) lastFrameTime = ts;
    const delta = (ts - lastFrameTime) * parseFloat(document.getElementById('speedSelect').value);
    lastFrameTime = ts;

    if (!isScrubbing) currentTimeMs += delta;

    if (currentTimeMs >= maxTimeMs) {
      if (document.getElementById('loopCb').checked) {
        currentTimeMs = 0;
      } else {
        currentTimeMs = maxTimeMs;
        isPlaying = false;
        playBtn.textContent = '▶ 再生';
      }
    }

    updateUI();
    draw();
    requestAnimationFrame(tick);
  }

  function handleData(d) {
    isPlaying = false;
    lastFrameTime = null;

    strokes = d.strokes || [];
    if (d.metadata && d.metadata.total_duration_ms) {
      maxTimeMs = d.metadata.total_duration_ms;
    } else if (strokes.length > 0) {
      const lastStroke = strokes[strokes.length - 1];
      maxTimeMs = lastStroke.points[lastStroke.points.length - 1].t;
    } else {
      maxTimeMs = 0;
    }

    seekBar.max = maxTimeMs;
    seekBar.disabled = false;
    playBtn.disabled = false;
    infoLabel.textContent = `ロード完了: ${d.label || 'Untitled'}`;

    currentTimeMs = 0;
    isPlaying = true;
    playBtn.textContent = '⏸ 停止';
    updateUI();
    draw();
    requestAnimationFrame(tick);
  }

  document.getElementById('loadBtn').onclick = () => document.getElementById('fileInput').click();

  document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => handleData(JSON.parse(ev.target.result));
    reader.readAsText(file);
  };

  window.addEventListener('dragover', (e) => e.preventDefault());
  window.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => handleData(JSON.parse(ev.target.result));
    reader.readAsText(file);
  });

  gridCb.onchange = () => draw();
  rainbowCb.onchange = () => draw();
  tipCb.onchange = () => draw();

  thickSlider.oninput = () => {
    thicknessMult = thickSlider.value / 10;
    thickVal.textContent = thicknessMult.toFixed(1) + 'x';
    draw();
  };

  canvas.onwheel = (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.min(Math.max(scale * factor, 0.1), 30);

    offsetX = mx - (mx - offsetX) * (newScale / scale);
    offsetY = my - (my - offsetY) * (newScale / scale);
    scale = newScale;
    draw();
  };

  canvas.onmousedown = (e) => {
    if (e.button === 2 || (e.button === 0 && e.altKey)) {
      isPanning = true;
      lastMouse = { x: e.clientX, y: e.clientY };
      canvas.style.cursor = 'grabbing';
    }
  };

  window.onmousemove = (e) => {
    if (!isPanning) return;
    offsetX += e.clientX - lastMouse.x;
    offsetY += e.clientY - lastMouse.y;
    lastMouse = { x: e.clientX, y: e.clientY };
    draw();
  };

  window.onmouseup = () => {
    isPanning = false;
    canvas.style.cursor = 'crosshair';
  };

  canvas.oncontextmenu = (e) => e.preventDefault();

  document.getElementById('resetViewBtn').onclick = () => {
    scale = 1.0;
    offsetX = 0;
    offsetY = 0;
    draw();
  };

  playBtn.onclick = () => {
    isPlaying = !isPlaying;
    playBtn.textContent = isPlaying ? '⏸ 停止' : '▶ 再生';
    if (isPlaying) {
      lastFrameTime = null;
      requestAnimationFrame(tick);
    }
  };

  seekBar.oninput = () => {
    isScrubbing = true;
    currentTimeMs = parseFloat(seekBar.value);
    updateUI();
    draw();
  };

  seekBar.onchange = () => {
    isScrubbing = false;
  };

  draw();
</script>
</body>
</html>
